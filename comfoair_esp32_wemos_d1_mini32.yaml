sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    update_interval: 60s

# binary_sensor:

switch:
  - platform: factory_reset
    name: Restart with Factory Default Settings

button:
  - platform: restart
    id: reset_button
    name: "Reset ESP32 Comfoair Adapter"
  - platform: template
    id: filter_reset_button
    name: "Reset Filter"
    web_server:
      sorting_group_id: sorting_group_filter
    on_press:
      then:
        lambda: "id(comfoair_climate).reset_filters();"

text_sensor:
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: GPIO17 # U2TX
  rx_pin: GPIO16 # U2RX

